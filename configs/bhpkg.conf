# ====================================================================
# Blackhole Package Manager (bhpkg) Configuration
# /etc/bhpkg/bhpkg.conf
#
# PRESET: Local Testing / QEMU Development Environment
# ====================================================================

[options]
# Verbosity Level (0 = Quiet, 1 = Normal, 2 = Verbose, 3 = Debug)
# Set to 3 to dump raw C compiler logs and system paths during package builds.
VERBOSITY=3

# Use pacman-style [C....o] progress bars. 
# You might want to set this to 'false' if you are piping the output into a log file.
PACMAN_MODE=true

# Global USE flags (prefix with '-' to disable a variant)
# For local testing, we enable debug/test builds and explicitly disable LTO 
# (-lto) because Link-Time Optimization takes a long time to compile.
USE="debug test dbus -x11 -wayland -lto"


# --------------------------------------------------------------------
# Local Repositories (Hosted via `python3 -m http.server 8000`)
# 10.0.2.2 is the default IP address to reach the Host OS from inside QEMU.
# --------------------------------------------------------------------

[repo:core]
URL=http://10.0.2.2:8000/core.db
SIG=http://10.0.2.2:8000/core.db.sig
# Path to your local development public key (used to sign the dev repo)
PUBKEY=/etc/bhpkg/keys/repo-pub.pem
PRIORITY=1

[repo:community]
URL=http://10.0.2.2:8000/community.db
SIG=http://10.0.2.2:8000/community.db.sig
PUBKEY=/etc/bhpkg/keys/repo-pub.pem
PRIORITY=2

[repo:testing]
# A dedicated testing repository for experimental packages
URL=http://10.0.2.2:8000/testing.db
SIG=http://10.0.2.2:8000/testing.db.sig
PUBKEY=/etc/bhpkg/keys/repo-pub.pem
# Highest priority: packages here will override versions in core or community
PRIORITY=0