# ====================================================================
# Blackhole Package Manager (bhpkg) Configuration
# /etc/bhpkg/bhpkg.conf
# ====================================================================

# --------------------------------------------------------------------
# Repository Settings
# --------------------------------------------------------------------

# Production Mirror (Official Blackhole OS Repository)
# Uncomment these when deploying the OS to real hardware
# REPO_URL=https://repo.blackhole-os.org/sync.db
# REPO_SIG_URL=https://repo.blackhole-os.org/sync.db.sig

# Local Testing Mirror (QEMU Host Gateway)
# Default for development. Points to python3 -m http.server 8000
REPO_URL=http://10.0.2.2:8000/sync.db
REPO_SIG_URL=http://10.0.2.2:8000/sync.db.sig

# Path to the RSA public key used to verify repository signatures
# Prevents MITM attacks and tampering.
PUBKEY_PATH=/etc/bhpkg/repo-pub.pem

# --------------------------------------------------------------------
# User Experience (UX) Settings
# --------------------------------------------------------------------

# Verbosity Level
# 0 = Quiet   : Only show warnings, errors, and critical prompts.
# 1 = Normal  : Show clean progress bars, spinners, and standard info.
# 2 = Verbose : Dump all raw GCC, Make, and build logs to the terminal.
VERBOSITY=1

# Pacman Mode
# true  : Use the animated, cool pacman-inspired [C....o] download progress bar.
# false : Use the classic [####----] progress bar.
PACMAN_MODE=false